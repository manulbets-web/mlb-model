<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:    #f5f2ed;
    --surface:  #ffffff;
    --surface2: #f0ede8;
    --border:   #ddd9d2;
    --border2:  #c8c3bb;
    --ink:      #1a1814;
    --ink2:     #4a4640;
    --ink3:     #8a8480;
    --navy:     #1c3150;
    --amber:    #b5631a;
    --green:    #2a6e3f;
    --red:      #8c2020;
    --rule:     rgba(26,24,20,0.12);

    --serif: 'Playfair Display', Georgia, serif;
    --sans:  'DM Sans', system-ui, sans-serif;
    --mono:  'DM Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Masthead ── */
  .masthead {
    background: var(--navy);
    color: #fff;
    padding: 0 40px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: #fff;
    flex-shrink: 0;
  }
  .masthead-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.25);
  }
  .masthead-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
  .masthead-meta b { color: rgba(255,255,255,0.9); font-weight: 400; }
  .masthead-right {
    margin-left: auto;
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 11px;
    font-family: var(--mono);
    color: rgba(255,255,255,0.6);
  }
  .masthead-right b { color: #fff; font-weight: 400; }

  /* ── Date bar ── */
  .datebar {
    background: var(--surface);
    border-bottom: 2px solid var(--navy);
    padding: 10px 40px;
    display: flex;
    align-items: baseline;
    gap: 24px;
  }
  .datebar-date {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .datebar-sub {
    font-size: 11px;
    color: var(--ink3);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .datebar-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink3);
    font-family: var(--mono);
  }
  .datebar-count b { color: var(--ink2); }

  /* ── Main layout ── */
  main { padding: 24px 40px; max-width: 1380px; }

  /* ── Column header row ── */
  .col-header {
    display: grid;
    grid-template-columns: 280px 150px 150px 100px 160px 28px;
    gap: 0;
    padding: 6px 16px;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 2px;
  }
  .col-header span {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
  }
  .col-header span:not(:first-child) { text-align: right; }

  /* ── Game card ── */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    margin-bottom: 3px;
    transition: border-left-color 0.15s;
  }
  .game-card:hover { border-left-color: var(--navy); }
  .game-card.open  { border-left-color: var(--navy); }

  /* ── Headline row ── */
  .card-headline {
    display: grid;
    grid-template-columns: 280px 150px 150px 100px 160px 28px;
    gap: 0;
    padding: 12px 16px;
    cursor: pointer;
    align-items: center;
    user-select: none;
  }
  .card-headline:hover { background: #faf8f5; }

  .matchup-col { display: flex; flex-direction: column; gap: 3px; }
  .teams-line {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .teams-line .at {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 300;
    color: var(--ink3);
    margin: 0 5px;
  }
  .game-info-line {
    font-size: 11px;
    color: var(--ink3);
    font-family: var(--sans);
  }
  .starters-line {
    font-size: 11px;
    color: var(--ink2);
    font-family: var(--sans);
  }
  .hand-badge {
    font-size: 9px;
    color: var(--ink3);
    font-family: var(--mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0 3px;
    border-radius: 2px;
    margin-left: 2px;
    vertical-align: middle;
  }

  .runs-col { text-align: right; }
  .runs-label { font-size: 9px; font-family: var(--mono); color: var(--ink3); letter-spacing: 0.06em; text-transform: uppercase; }
  .runs-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .runs-val .rs { color: var(--green); }
  .runs-val .ra { color: var(--red); }
  .runs-val .sep { color: var(--border2); margin: 0 3px; }

  .total-col { text-align: right; }
  .total-val {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    color: var(--navy);
  }
  .total-label { font-size: 9px; font-family: var(--mono); color: var(--ink3); letter-spacing: 0.06em; text-transform: uppercase; }

  .odds-col { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .odds-row { display: flex; align-items: center; gap: 8px; }
  .odds-team { font-size: 10px; font-family: var(--mono); color: var(--ink3); width: 34px; text-align: right; }
  .ml-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 400;
    min-width: 52px;
    text-align: right;
  }
  .ml-val.fav  { color: var(--navy); }
  .ml-val.dog  { color: var(--amber); }
  .ml-val.pick { color: var(--ink2); }
  .wp-val { font-size: 10px; font-family: var(--mono); color: var(--ink3); min-width: 40px; text-align: right; }

  .chevron-col { display: flex; justify-content: flex-end; align-items: center; }
  .chevron {
    width: 16px; height: 16px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    color: var(--ink3);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .open .chevron { background: var(--navy); border-color: var(--navy); color: #fff; }

  /* ── Expanded body ── */
  .card-body { display: none; border-top: 1px solid var(--border); }
  .card-body.visible { display: block; }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    background: var(--surface2);
  }
  .tab {
    padding: 8px 14px;
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s;
  }
  .tab:hover { color: var(--ink2); }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 500; }

  .tab-panel { display: none; padding: 20px; }
  .tab-panel.active { display: block; }

  /* ── Calc trace ── */
  .trace-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }

  .trace-team-head {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .trace-team-head .side-tag {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
    font-style: normal;
  }

  .trace-section { margin-bottom: 18px; }
  .trace-section-title {
    font-size: 9px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .trace-eq {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--ink3);
    padding: 5px 10px;
    background: var(--surface2);
    border-left: 2px solid var(--border2);
    margin: 6px 0;
    line-height: 1.6;
  }
  .trace-eq b { color: var(--amber); font-weight: 500; }

  .trace-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
  }
  .trace-row:last-child { border-bottom: none; }
  .trace-label { color: var(--ink2); }
  .trace-val   { font-family: var(--mono); color: var(--ink); }
  .trace-val.key {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    color: var(--navy);
  }
  .trace-val.rs-val { color: var(--green); font-family: var(--mono); font-size: 14px; }
  .trace-val.ra-val { color: var(--red);   font-family: var(--mono); font-size: 14px; }

  /* ── Win prob path ── */
  .prob-flow {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 10px;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
  }
  .prob-step {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--ink2);
    white-space: nowrap;
  }
  .prob-step.final {
    border-color: var(--navy);
    background: var(--navy);
    color: #fff;
    font-weight: 500;
  }
  .prob-arrow { color: var(--ink3); font-size: 10px; }

  /* ── Full-width win prob section ── */
  .win-prob-section {
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding-top: 18px;
  }
  .win-prob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-top: 12px; }

  /* ── Lineup table ── */
  .lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .lineup-team-head {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 10px;
    color: var(--ink);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border2);
  }

  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  thead tr { border-bottom: 2px solid var(--border2); }
  th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    font-weight: 400;
    padding: 4px 6px;
    text-align: right;
  }
  th:first-child { text-align: left; }
  td {
    padding: 4px 6px;
    text-align: right;
    border-bottom: 1px solid var(--rule);
    font-family: var(--mono);
    color: var(--ink2);
  }
  td:first-child {
    text-align: left;
    font-family: var(--sans);
    color: var(--ink);
    font-size: 12px;
  }
  tr:last-child td { border-bottom: none; }
  .total-row td {
    font-weight: 500;
    color: var(--navy);
    border-top: 1px solid var(--border2);
    border-bottom: none;
    padding-top: 6px;
  }
  .total-row td:first-child { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }

  .scalar-pos { color: var(--green); }
  .scalar-neg { color: var(--red); }
  .scalar-neu { color: var(--ink3); }

  /* ── Pitcher boxes ── */
  .pitcher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
  .pitcher-box {
    border: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--surface);
  }
  .pitcher-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .pitcher-team-hand {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink3);
    font-weight: 400;
    margin-left: 6px;
  }
  .pitcher-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .pstat-label { font-size: 9px; font-family: var(--mono); color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; }
  .pstat-val   { font-size: 14px; font-family: var(--mono); color: var(--ink); margin-top: 2px; }

  .bullpen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .bullpen-section-title {
    font-size: 9px; font-family: var(--mono); letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--navy);
    margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }

  /* ── Error / loading states ── */
  .loading { padding: 60px 40px; color: var(--ink3); font-family: var(--sans); display: flex; align-items: center; gap: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; }

  .error-box {
    margin: 24px 0;
    border: 1px solid #c8a88a;
    background: #fdf6ee;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--amber);
    font-family: var(--mono);
  }

  .no-data { text-align: center; padding: 80px 20px; color: var(--ink3); }
  .no-data-title { font-family: var(--serif); font-size: 20px; margin-bottom: 8px; color: var(--ink2); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-title">MLB Model</div>
  <div class="masthead-divider"></div>
  <div class="masthead-meta">
    <span id="hdr-date">—</span>
  </div>
  <div class="masthead-right">
    <span>LG AVG R/G <b id="hdr-lg">4.50</b></span>
    <span><b id="hdr-games">—</b> games</span>
    <span>Generated <b id="hdr-gen">—</b></span>
  </div>
</div>

<div class="datebar">
  <div class="datebar-date" id="date-display">—</div>
  <div class="datebar-sub">Daily Slate</div>
  <div class="datebar-count"><b id="games-count">—</b> games</div>
</div>

<main id="main">
  <div class="loading"><div class="spinner"></div> Loading slate data…</div>
</main>

<script>
// ─────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────
const fmt  = (v, d=2) => v == null ? '—' : (+v).toFixed(d);
const fmtP = v => v == null ? '—' : ((+v)*100).toFixed(1)+'%';
const fmtML = v => {
  if (v == null) return '—';
  return (+v) > 0 ? '+'+v : ''+v;
};
const mlCls = v => {
  if (v == null) return 'pick';
  return (+v) < -109 ? 'fav' : (+v) > 109 ? 'dog' : 'pick';
};
const scalarCls = s => {
  if (s == null) return 'scalar-neu';
  return s > 1.03 ? 'scalar-pos' : s < 0.97 ? 'scalar-neg' : 'scalar-neu';
};
const gameTime = utc => {
  if (!utc) return '';
  try {
    return new Date(utc).toLocaleTimeString('en-US',
      {hour:'numeric', minute:'2-digit', timeZoneName:'short'});
  } catch { return ''; }
};
const fmtDate = d => {
  if (!d) return '—';
  try {
    const dt = new Date(d+'T12:00:00');
    return dt.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
  } catch { return d; }
};

// ─────────────────────────────────────────────
// Card builder
// ─────────────────────────────────────────────
function buildCard(g, idx) {
  const id = 'g'+idx;
  const awayHand = g.away_starter_hand || '';
  const homeHand = g.home_starter_hand || '';
  const awaySP   = g.away_starter || 'TBD';
  const homeSP   = g.home_starter || 'TBD';

  // ── Lineup rows ──
  const lineupRows = (players) => {
    if (!players || players.length === 0)
      return `<tr><td colspan="7" style="color:var(--ink3);font-family:var(--sans)">Lineup not yet posted</td></tr>`;
    let rows = players.map((p,i) => {
      const sc  = p.adj_scalar;
      const cls = scalarCls(sc);
      const scDisp = sc != null ? ((sc-1)*100 >= 0 ? '+' : '') + ((sc-1)*100).toFixed(1)+'%' : '—';
      return `<tr>
        <td>${i+1}. ${p.name || '—'}</td>
        <td>${fmt(p.proj_woba,3)}</td>
        <td>${fmt(p.act_woba,3)||'—'}</td>
        <td class="${cls}">${scDisp}</td>
        <td>${fmt(p.upd_wrc_pa,4)}</td>
        <td>${fmt(p.proj_pa_g,2)}</td>
        <td>${fmt(p.off_runs_g,4)}</td>
      </tr>`;
    }).join('');
    const total = players.reduce((s,p) => s + (p.off_runs_g||0), 0);
    rows += `<tr class="total-row">
      <td colspan="6">Team total off_runs_g</td>
      <td>${fmt(total,4)}</td>
    </tr>`;
    return rows;
  };

  return `
<div class="game-card" id="${id}">
  <div class="card-headline" onclick="toggle('${id}')">

    <div class="matchup-col">
      <div class="teams-line">
        ${g.away_abbr}<span class="at">@</span>${g.home_abbr}
      </div>
      <div class="game-info-line">${g.venue_name||''} &middot; ${gameTime(g.game_time_utc)}</div>
      <div class="starters-line">
        ${awaySP}<span class="hand-badge">${awayHand}</span>
        <span style="color:var(--ink3)"> vs </span>
        ${homeSP}<span class="hand-badge">${homeHand}</span>
      </div>
    </div>

    <div class="runs-col">
      <div class="runs-label">${g.away_abbr} &nbsp;RS / RA</div>
      <div class="runs-val">
        <span class="rs">${fmt(g.rs_away)}</span>
        <span class="sep">/</span>
        <span class="ra">${fmt(g.ra_away)}</span>
      </div>
    </div>

    <div class="runs-col">
      <div class="runs-label">${g.home_abbr} &nbsp;RS / RA</div>
      <div class="runs-val">
        <span class="rs">${fmt(g.rs_home)}</span>
        <span class="sep">/</span>
        <span class="ra">${fmt(g.ra_home)}</span>
      </div>
    </div>

    <div class="total-col">
      <div class="total-val">${fmt(g.exp_total,1)}</div>
      <div class="total-label">Exp Total</div>
    </div>

    <div class="odds-col">
      <div class="odds-row">
        <span class="odds-team">${g.away_abbr}</span>
        <span class="ml-val ${mlCls(g.ml_away)}">${fmtML(g.ml_away)}</span>
        <span class="wp-val">${fmtP(g.game_wpct_away)}</span>
      </div>
      <div class="odds-row">
        <span class="odds-team">${g.home_abbr}</span>
        <span class="ml-val ${mlCls(g.ml_home)}">${fmtML(g.ml_home)}</span>
        <span class="wp-val">${fmtP(g.game_wpct_home)}</span>
      </div>
    </div>

    <div class="chevron-col">
      <div class="chevron">▾</div>
    </div>
  </div>

  <div class="card-body" id="${id}-body">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('${id}','trace',this)">Calc Trace</div>
      <div class="tab"       onclick="switchTab('${id}','lineup',this)">Lineups</div>
      <div class="tab"       onclick="switchTab('${id}','pitching',this)">Pitching</div>
    </div>

    <!-- TRACE PANEL -->
    <div class="tab-panel active" id="${id}-trace">
      <div class="trace-grid">

        <!-- AWAY -->
        <div>
          <div class="trace-team-head">
            ${g.away_abbr}
            <span class="side-tag">Away</span>
          </div>

          <div class="trace-section">
            <div class="trace-section-title">Offensive Run Expectancy</div>
            <div class="trace-eq">off_runs_g = &Sigma;(upd_wRC/PA &times; PA/G + BsR/G) across lineup</div>
            <div class="trace-row"><span class="trace-label">Team off_runs_g (raw sum)</span><span class="trace-val">${fmt(g.team_off_g_away,4)}</span></div>
            <div class="trace-eq">RS/G = (team_off / lg_avg_off) &times; <b>4.50</b> &times; PF</div>
            <div class="trace-row"><span class="trace-label">League avg off_runs_g</span><span class="trace-val">${fmt(g.league_avg_off,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Park factor</span><span class="trace-val">${fmt(g.park_factor_away,3)}</span></div>
            <div class="trace-row"><span class="trace-label">Expected runs scored</span><span class="trace-val rs-val">${fmt(g.rs_away)}</span></div>
          </div>

          <div class="trace-section">
            <div class="trace-section-title">Run Prevention (facing ${g.home_abbr})</div>
            <div class="trace-eq">eff_ERA = SP_ERA &times; (SP_IP/9) + BP_ERA &times; (BP_IP/9) &minus; UZR/G &minus; Framing/G</div>
            <div class="trace-row"><span class="trace-label">Opp starter proj ERA</span><span class="trace-val">${fmt(g.opp_starter_era_away,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Opp starter IP/start</span><span class="trace-val">${fmt(g.opp_starter_ip_away,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Opp bullpen ERA</span><span class="trace-val">${fmt(g.opp_bp_era_away,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Team UZR/G (subtracted)</span><span class="trace-val">${fmt(g.sum_uzr_g_away,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Team framing/G (subtracted)</span><span class="trace-val">${fmt(g.sum_fram_g_away,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Effective ERA</span><span class="trace-val">${fmt(g.eff_era_away,3)}</span></div>
            <div class="trace-eq">RA/G = (eff_ERA / lg_avg_ERA) &times; <b>4.50</b> &times; PF</div>
            <div class="trace-row"><span class="trace-label">Expected runs allowed</span><span class="trace-val ra-val">${fmt(g.ra_away)}</span></div>
          </div>
        </div>

        <!-- HOME -->
        <div>
          <div class="trace-team-head">
            ${g.home_abbr}
            <span class="side-tag">Home</span>
          </div>

          <div class="trace-section">
            <div class="trace-section-title">Offensive Run Expectancy</div>
            <div class="trace-eq">off_runs_g = &Sigma;(upd_wRC/PA &times; PA/G + BsR/G) across lineup</div>
            <div class="trace-row"><span class="trace-label">Team off_runs_g (raw sum)</span><span class="trace-val">${fmt(g.team_off_g_home,4)}</span></div>
            <div class="trace-eq">RS/G = (team_off / lg_avg_off) &times; <b>4.50</b> &times; PF</div>
            <div class="trace-row"><span class="trace-label">League avg off_runs_g</span><span class="trace-val">${fmt(g.league_avg_off,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Park factor</span><span class="trace-val">${fmt(g.park_factor_home,3)}</span></div>
            <div class="trace-row"><span class="trace-label">Expected runs scored</span><span class="trace-val rs-val">${fmt(g.rs_home)}</span></div>
          </div>

          <div class="trace-section">
            <div class="trace-section-title">Run Prevention (facing ${g.away_abbr})</div>
            <div class="trace-eq">eff_ERA = SP_ERA &times; (SP_IP/9) + BP_ERA &times; (BP_IP/9) &minus; UZR/G &minus; Framing/G</div>
            <div class="trace-row"><span class="trace-label">Opp starter proj ERA</span><span class="trace-val">${fmt(g.opp_starter_era_home,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Opp starter IP/start</span><span class="trace-val">${fmt(g.opp_starter_ip_home,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Opp bullpen ERA</span><span class="trace-val">${fmt(g.opp_bp_era_home,2)}</span></div>
            <div class="trace-row"><span class="trace-label">Team UZR/G (subtracted)</span><span class="trace-label">${fmt(g.sum_uzr_g_home,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Team framing/G (subtracted)</span><span class="trace-val">${fmt(g.sum_fram_g_home,4)}</span></div>
            <div class="trace-row"><span class="trace-label">Effective ERA</span><span class="trace-val">${fmt(g.eff_era_home,3)}</span></div>
            <div class="trace-eq">RA/G = (eff_ERA / lg_avg_ERA) &times; <b>4.50</b> &times; PF</div>
            <div class="trace-row"><span class="trace-label">Expected runs allowed</span><span class="trace-val ra-val">${fmt(g.ra_home)}</span></div>
          </div>
        </div>
      </div>

      <!-- WIN PROBABILITY -->
      <div class="win-prob-section">
        <div class="trace-section-title">Win Probability Path</div>
        <div class="win-prob-grid">
          <div>
            <div style="font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:10px">${g.away_abbr}</div>
            <div class="trace-eq">xWins = (0.294 &times; 162) + lineup_WAR + bullpen_WAR</div>
            <div class="trace-row"><span class="trace-label">xWins</span><span class="trace-val">${fmt(g.xwins_away,1)}</span></div>
            <div class="trace-row"><span class="trace-label">ROS W%</span><span class="trace-val">${fmtP(g.ros_wpct_away)}</span></div>
            <div class="trace-row"><span class="trace-label">WAR path W%</span><span class="trace-val">${fmtP(g.war_wpct_away)}</span></div>
            <div class="trace-row"><span class="trace-label">Pythagorean W%</span><span class="trace-val">${fmtP(g.pythag_away)}</span></div>
            <div class="trace-eq">Blend = (WAR W% + Pythag W%) / 2, renormalised</div>
            <div class="prob-flow">
              <span class="prob-step">xW ${fmt(g.xwins_away,1)}</span>
              <span class="prob-arrow">→</span>
              <span class="prob-step">ROS ${fmtP(g.ros_wpct_away)}</span>
              <span class="prob-arrow">→</span>
              <span class="prob-step final">${fmtP(g.game_wpct_away)} &nbsp; ${fmtML(g.ml_away)}</span>
            </div>

          </div>
          <div>
            <div style="font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:10px">${g.home_abbr}</div>
            <div class="trace-eq">xWins = (0.294 &times; 162) + lineup_WAR + bullpen_WAR</div>
            <div class="trace-row"><span class="trace-label">xWins</span><span class="trace-val">${fmt(g.xwins_home,1)}</span></div>
            <div class="trace-row"><span class="trace-label">ROS W%</span><span class="trace-val">${fmtP(g.ros_wpct_home)}</span></div>
            <div class="trace-row"><span class="trace-label">WAR path W%</span><span class="trace-val">${fmtP(g.war_wpct_away!=null?1-g.war_wpct_away:null)}</span></div>
            <div class="trace-row"><span class="trace-label">Pythagorean W%</span><span class="trace-val">${fmtP(g.pythag_away!=null?1-g.pythag_away:null)}</span></div>
            <div class="trace-eq">HF adj: ROS W% &times; 1.04 &nbsp;&mdash;&nbsp; Blend renormalised</div>
            <div class="prob-flow">
              <span class="prob-step">xW ${fmt(g.xwins_home,1)}</span>
              <span class="prob-arrow">→</span>
              <span class="prob-step">ROS ${fmtP(g.ros_wpct_home)}</span>
              <span class="prob-arrow">→</span>
              <span class="prob-step final">${fmtP(g.game_wpct_home)} &nbsp; ${fmtML(g.ml_home)}</span>
            </div>

          </div>
        </div>

        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
          <div class="trace-section-title">Expected Total</div>
          <div class="trace-eq">total = (RS_A/lgRG &times; RA_H/lgRG + RS_H/lgRG &times; RA_A/lgRG) &times; lgRG &times; PF</div>
          <div class="trace-row" style="max-width:400px">
            <span class="trace-label">Expected total (live)</span>
            <span class="trace-val key">${fmt(g.exp_total,1)}</span>
          </div>
          ${g.stable_total != null ? `
          <div class="trace-row" style="max-width:400px">
            <span class="trace-label" style="color:var(--ink3)">Expected total (stable/Steamer)</span>
            <span class="trace-val" style="color:var(--amber);font-family:var(--mono)">${fmt(g.stable_total,1)}</span>
          </div>` : ''}
        </div>
      </div>
    </div><!-- /trace -->

    <!-- LINEUP PANEL -->
    <div class="tab-panel" id="${id}-lineup">
      <div class="lineup-grid">
        <div>
          <div class="lineup-team-head">${g.away_abbr} &mdash; vs ${homeHand}HP</div>
          <table>
            <thead><tr>
              <th style="text-align:left">Batter</th>
              <th>Proj wOBA</th><th>Act wOBA</th><th>Scalar</th>
              <th>Upd wRC/PA</th><th>PA/G</th><th>Off R/G</th>
            </tr></thead>
            <tbody>${lineupRows(g._away_lineup)}</tbody>
          </table>
        </div>
        <div>
          <div class="lineup-team-head">${g.home_abbr} &mdash; vs ${awayHand}HP</div>
          <table>
            <thead><tr>
              <th style="text-align:left">Batter</th>
              <th>Proj wOBA</th><th>Act wOBA</th><th>Scalar</th>
              <th>Upd wRC/PA</th><th>PA/G</th><th>Off R/G</th>
            </tr></thead>
            <tbody>${lineupRows(g._home_lineup)}</tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PITCHING PANEL -->
    <div class="tab-panel" id="${id}-pitching">
      <div class="pitcher-grid">
        <div class="pitcher-box">
          <div class="pitcher-name">
            ${awaySP}
            <span class="pitcher-team-hand">${awayHand}HP &middot; ${g.away_abbr}</span>
          </div>
          <div class="pitcher-stats">
            <div><div class="pstat-label">Proj ERA</div><div class="pstat-val">${fmt(g.opp_starter_era_home,2)}</div></div>
            <div><div class="pstat-label">IP / GS</div><div class="pstat-val">${fmt(g.opp_starter_ip_home,1)}</div></div>
          </div>
        </div>
        <div class="pitcher-box">
          <div class="pitcher-name">
            ${homeSP}
            <span class="pitcher-team-hand">${homeHand}HP &middot; ${g.home_abbr}</span>
          </div>
          <div class="pitcher-stats">
            <div><div class="pstat-label">Proj ERA</div><div class="pstat-val">${fmt(g.opp_starter_era_away,2)}</div></div>
            <div><div class="pstat-label">IP / GS</div><div class="pstat-val">${fmt(g.opp_starter_ip_away,1)}</div></div>
          </div>
        </div>
      </div>
      <div class="bullpen-grid">
        <div>
          <div class="bullpen-section-title">${g.away_abbr} Bullpen</div>
          <div class="trace-row"><span class="trace-label">Bullpen ERA</span><span class="trace-val">${fmt(g.bullpen_era_away||g.opp_bp_era_away,2)}</span></div>
          <div class="trace-row"><span class="trace-label">IP (season)</span><span class="trace-val">${fmt(g.bullpen_ip_away,0)}</span></div>
          <div class="trace-row"><span class="trace-label">Relievers</span><span class="trace-val">${g.n_relievers_away||'—'}</span></div>
        </div>
        <div>
          <div class="bullpen-section-title">${g.home_abbr} Bullpen</div>
          <div class="trace-row"><span class="trace-label">Bullpen ERA</span><span class="trace-val">${fmt(g.bullpen_era_home||g.opp_bp_era_home,2)}</span></div>
          <div class="trace-row"><span class="trace-label">IP (season)</span><span class="trace-val">${fmt(g.bullpen_ip_home,0)}</span></div>
          <div class="trace-row"><span class="trace-label">Relievers</span><span class="trace-val">${g.n_relievers_home||'—'}</span></div>
        </div>
      </div>
    </div>

  </div>

  ${g.stable_ml_away != null ? `
  <div style="background:var(--surface2);border-top:1px solid var(--border);padding:7px 16px;
              display:flex;align-items:center;gap:24px;flex-wrap:wrap;font-size:10px;font-family:var(--mono);">
    <span style="color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0">Steamer baseline</span>
    <div style="display:flex;gap:6px;align-items:baseline">
      <span style="color:var(--ink3)">${g.away_abbr}</span>
      <span style="color:var(--amber);font-size:12px">${fmtML(g.stable_ml_away)}</span>
    </div>
    <div style="display:flex;gap:6px;align-items:baseline">
      <span style="color:var(--ink3)">${g.home_abbr}</span>
      <span style="color:var(--amber);font-size:12px">${fmtML(g.stable_ml_home)}</span>
    </div>
    <div style="display:flex;gap:4px">
      <span style="color:var(--ink3)">Total</span>
      <span style="color:var(--amber)">${fmt(g.stable_total,1)}</span>
    </div>
    <div style="display:flex;gap:4px">
      <span style="color:var(--ink3)">xW ${g.away_abbr}</span>
      <span style="color:var(--ink2)">${fmt(g.stable_xwins_away,1)}</span>
    </div>
    <div style="display:flex;gap:4px">
      <span style="color:var(--ink3)">xW ${g.home_abbr}</span>
      <span style="color:var(--ink2)">${fmt(g.stable_xwins_home,1)}</span>
    </div>
    <div style="display:flex;gap:4px">
      <span style="color:var(--ink3)">W%</span>
      <span style="color:var(--amber)">${fmtP(g.stable_wpct_away)}</span>
    </div>
  </div>` : ''}

</div>`;
}

// ─────────────────────────────────────────────
// Interaction
// ─────────────────────────────────────────────
function toggle(id) {
  const card = document.getElementById(id);
  const body = document.getElementById(id+'-body');
  card.classList.toggle('open');
  body.classList.toggle('visible');
}
function switchTab(id, panel, el) {
  const body = document.getElementById(id+'-body');
  body.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  body.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id+'-'+panel).classList.add('active');
}

// ─────────────────────────────────────────────
// Data loading
// ─────────────────────────────────────────────
async function loadSlate() {
  const main = document.getElementById('main');
  try {
    const res = await fetch('slate_latest.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — slate_latest.json not found`);
    const data = await res.json();
    renderSlate(data);
  } catch(e) {
    main.innerHTML = `
      <div class="error-box">
        Could not load slate_latest.json<br>
        ${e.message}<br><br>
        Run 06_output.R, then copy slate_latest.json to this directory.<br>
        Serve with: <code>python3 -m http.server 8080</code>
      </div>
      <div class="no-data">
        <div class="no-data-title">No slate data</div>
        <div style="font-size:12px;color:var(--ink3)">Run the R pipeline then reload</div>
      </div>`;
  }
}

function renderSlate(data) {
  const games = data.games || [];
  const date  = data.slate_date || '';

  document.getElementById('hdr-date').textContent   = date;
  document.getElementById('hdr-gen').textContent    = (data.generated||'').replace('T',' ').slice(0,16);
  document.getElementById('hdr-lg').textContent     = (+data.league_avg_rg||4.5).toFixed(2);
  document.getElementById('hdr-games').textContent  = games.length;
  document.getElementById('date-display').textContent = fmtDate(date);
  document.getElementById('games-count').textContent  = games.length;

  const main = document.getElementById('main');
  if (games.length === 0) {
    main.innerHTML = `<div class="no-data"><div class="no-data-title">No games today</div></div>`;
    return;
  }

  const enriched = games.map(g => ({
    ...g,
    _away_lineup: g.lineup_away || [],
    _home_lineup: g.lineup_home || [],
  }));

  main.innerHTML =
    `<div class="col-header">
      <span>Matchup</span>
      <span style="text-align:right">Away RS / RA</span>
      <span style="text-align:right">Home RS / RA</span>
      <span style="text-align:right">Total</span>
      <span style="text-align:right">Moneyline / W%</span>
      <span></span>
    </div>` +
    enriched.map((g,i) => buildCard(g,i)).join('');
}

loadSlate();
</script>
</body>
</html>
